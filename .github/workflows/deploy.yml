name: Deploy HTML Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Website
        run: |
          sudo cp index.html /var/www/html/
          sudo cp style.css /var/www/html/
          sudo systemctl restart apache2

      - name: Verify Deployment
        run: |
          ls -l /var/www/html/